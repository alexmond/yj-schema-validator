name: Test Native Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: yj-schema-validator-linux-amd64
            extension: ''
          - os: ubuntu-24.04-arm
            artifact: yj-schema-validator-linux-arm64
            extension: ''
          - os: macos-13
            artifact: yj-schema-validator-macos-amd64
            extension: ''
          - os: macos-latest
            artifact: yj-schema-validator-macos-arm64
            extension: ''
          - os: windows-latest
            artifact: yj-schema-validator-windows-amd64
            extension: '.exe'

    runs-on: ${{ matrix.os }}
    name: Native ${{ matrix.artifact }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '23'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Visual Studio shell (Windows only)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build native image
        run: ./mvnw -B -Pnative native:compile -DskipTests --no-transfer-progress

      - name: Smoke test
        shell: bash
        run: |
          ./target/yj-schema-validator${{ matrix.extension }} --help
          ./target/yj-schema-validator${{ matrix.extension }} --schema=src/test/resources/testdata/sample-schema.json src/test/resources/testdata/valid.yaml
