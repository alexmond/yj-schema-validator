name: Maven Release

on:
  workflow_dispatch:
    inputs:
      releaseVersion:
        description: 'Release version'
        required: true
      nextVersion:
        description: 'Next development version (with -SNAPSHOT suffix)'
        required: true

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Important for git history

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'
          server-id: central
          server-username: OSSRH_USERNAME
          server-password: OSSRH_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Configure Git User
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Prepare Release
        run: |
          mvn versions:set -DnewVersion=${{ github.event.inputs.releaseVersion }} --no-transfer-progress
          git commit -am "Prepare release ${{ github.event.inputs.releaseVersion }}"
          git tag -a ${{ github.event.inputs.releaseVersion }} -m "Release ${{ github.event.inputs.releaseVersion }}"

      - name: Copy Maven settings.xml
        run: |
          env
          mkdir -p ~/.m2
          cp .github/settings.xml ~/.m2/settings.xml

      - name: Deploy to Maven Central
        run: mvn --batch-mode -Dgpg.passphrase=${{ secrets.GPG_PASSPHRASE }} clean deploy -Prelease --no-transfer-progress
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      # Publish the buildpacks image here (same job, POM still at the release version)
      # rather than in a separate tag-triggered workflow: a tag pushed with GITHUB_TOKEN
      # does not trigger other workflows, so a `push: tags` workflow would never fire.
      - name: Publish image to GHCR (Spring Boot buildpacks)
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTOR: ${{ github.actor }}
          OWNER: ${{ github.repository_owner }}
          RELEASE_VERSION: ${{ github.event.inputs.releaseVersion }}
        run: |
          set -euo pipefail
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$ACTOR" --password-stdin
          ./mvnw -B spring-boot:build-image -DskipTests --no-transfer-progress
          IMAGE="ghcr.io/${OWNER}/yj-schema-validator"
          docker tag "${IMAGE}:${RELEASE_VERSION}" "${IMAGE}:latest"
          docker push "${IMAGE}:${RELEASE_VERSION}"
          docker push "${IMAGE}:latest"

      - name: Prepare for Next Development Version
        run: |
          mvn versions:set -DnewVersion=${{ github.event.inputs.nextVersion }} --no-transfer-progress
          git commit -am "Prepare for next development iteration: ${{ github.event.inputs.nextVersion }}"

      - name: Push Changes
        run: git push && git push --tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.releaseVersion }}
          name: Release ${{ github.event.inputs.releaseVersion }}
          generate_release_notes: true
          # Attach the executable fat JAR built by the deploy step (still in target/;
          # versions:set for the next dev version does not rebuild). Sources/javadoc
          # jars are excluded by pinning the classifier-less name.
          files: target/yj-schema-validator-${{ github.event.inputs.releaseVersion }}.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
