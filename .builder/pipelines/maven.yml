name: Java CI with Maven
on: [push, manual]
checkout: true
push:
  branches: [main]
jobs:
  build:
    image: eclipse-temurin:17-jdk
    cache:
      key: m2-yj-schema-validator
      paths: [.m2/repository]
    steps:
      - name: Build with Maven
        run: ./mvnw -B package --file pom.xml -Pdefault --no-transfer-progress -Dmaven.repo.local=.m2/repository
